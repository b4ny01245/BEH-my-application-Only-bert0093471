<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEH - Dashboard</title>
  <link rel="stylesheet" href="global.css">
  <style>
    .dashboard {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .dashboard h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 36px;
    }

    .widgets {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .widget {
      background: var(--surface);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .widget h3 {
      margin-bottom: 15px;
      font-size: 16px;
    }

    .widget input[type="range"] {
      width: 100%;
      margin-bottom: 10px;
    }

    .widget-value {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
      font-weight: 600;
      font-size: 18px;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .quick-actions button {
      padding: 15px 20px;
      font-size: 14px;
      border-radius: 8px;
      width: 100%;
    }

    .reset-btn {
      background: #dc2626;
      color: white;
    }

    .reset-btn:hover {
      background: #991b1b;
    }

    .nav-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-links a {
      display: inline-block;
      padding: 12px 24px;
      background: var(--surface);
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid var(--primary);
      transition: all 0.2s;
    }

    .nav-links a:hover {
      background: var(--primary);
      color: white;
      text-decoration: none;
    }

    .status {
      text-align: center;
      color: var(--muted);
      margin-top: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <h1>🧠 BEH</h1>

    <div class="widgets">
      <div class="widget">
        <h3>Today's Mood</h3>
        <input type="range" id="moodSlider" min="1" max="10" value="5">
        <div class="widget-value">
          <span id="moodValue">5</span><span>/10</span>
        </div>
      </div>

      <div class="widget">
        <h3>Focus Level</h3>
        <input type="range" id="focusSlider" min="1" max="10" value="5">
        <div class="widget-value">
          <span id="focusValue">5</span><span>/10</span>
        </div>
      </div>

      <div class="widget">
        <h3>Energy Level</h3>
        <input type="range" id="energySlider" min="1" max="10" value="5">
        <div class="widget-value">
          <span id="energyValue">5</span><span>/10</span>
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <button id="saveReflection">💾 Save Reflection</button>
      <button onclick="location.href='chat.html'">💬 Open Chat</button>
      <button onclick="location.href='memory.html'">👤 Edit Profile</button>
      <button id="resetButton" class="reset-btn">🔄 Reset All Data</button>
    </div>

    <div class="nav-links">
      <a href="chat.html">Chat</a>
      <a href="memory.html">Profile</a>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { db } from "./db.js";

    const moodSlider = document.getElementById("moodSlider");
    const focusSlider = document.getElementById("focusSlider");
    const energySlider = document.getElementById("energySlider");
    const moodValue = document.getElementById("moodValue");
    const focusValue = document.getElementById("focusValue");
    const energyValue = document.getElementById("energyValue");
    const saveBtn = document.getElementById("saveReflection");
    const resetBtn = document.getElementById("resetButton");
    const status = document.getElementById("status");

    moodSlider.addEventListener("input", (e) => {
      moodValue.textContent = e.target.value;
    });

    focusSlider.addEventListener("input", (e) => {
      focusValue.textContent = e.target.value;
    });

    energySlider.addEventListener("input", (e) => {
      energyValue.textContent = e.target.value;
    });

    saveBtn.addEventListener("click", async () => {
      try {
        await db.init();
        
        const reflection = {
          date: new Date().toISOString().split("T")[0],
          mood: parseInt(moodSlider.value),
          focus: parseInt(focusSlider.value),
          energy: parseInt(energySlider.value),
          timestamp: Date.now()
        };

        const tx = db.db.transaction("reflections", "readwrite");
        const req = tx.objectStore("reflections").add(reflection);
        
        req.onsuccess = () => {
          status.textContent = "✅ Reflection saved!";
          setTimeout(() => {
            status.textContent = "";
          }, 3000);
        };
      } catch (error) {
        console.error("Error:", error);
        status.textContent = "❌ Error saving reflection";
      }
    });

    // Reset button with confirmation
    resetBtn.addEventListener("click", async () => {
      const confirmed = confirm(
        "⚠️ This will delete ALL data:\n\n" +
        "- Chat history\n" +
        "- Profile\n" +
        "- Reflections\n" +
        "- All saved information\n\n" +
        "This cannot be undone. Are you sure?"
      );

      if (!confirmed) return;

      const finalConfirm = confirm(
        "🔄 Final confirmation: Delete everything?\n\n" +
        "Type 'RESET' in the next prompt to confirm."
      );

      if (!finalConfirm) return;

      try {
        await db.init();
        await db.resetAll();
        
        status.textContent = "✅ All data has been reset!";
        setTimeout(() => {
          // Reload page to reflect changes
          location.reload();
        }, 1500);
      } catch (error) {
        console.error("Error resetting data:", error);
        status.textContent = "❌ Error resetting data: " + error.message;
      }
    });
  </script>
</body>
</html>
